<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="header">
    <span class="logo">ZeroPhish</span>
    <div class="status-dot pulse"></div>
  </div>

  <div class="dashboard">
    <div class="score-container">
      <div id="threat-score">0</div>
      <div class="score-label">THREAT LEVEL</div>
    </div>

    <div class="summary-row">
      <div id="threat-category" class="pill pill-safe">SAFE</div>
    </div>
    <div id="summary-text" class="summary-text">Ready to protect...</div>

    <button id="scan-btn">INITIALIZE SCAN</button>

    <div class="analysis-box">
      <div class="tier-header">TIER 1: LOCAL HEURISTICS</div>
      <div id="status-text">Ready to protect...</div>
      <div id="ml-status" style="font-size: 10px; color: #888; margin-top: 6px;"></div>

      <div class="section-title">Why?</div>
      <ul id="reasons-list" class="reasons-list"></ul>

      <button id="toggle-details" class="details-btn" type="button">Show details</button>
      <div id="details-container" class="details-container" style="display:none;">
        <div class="section-title">Technical details</div>
        <ul id="evidence-list" class="details-list"></ul>
      </div>
    </div>
  </div>

  <script type="module" src="sidepanel.js"></script>
</body>
</html>

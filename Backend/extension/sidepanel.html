<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <span class="logo">🛡️ ZeroPhish</span>
        <div class="status-dot pulse"></div>
    </div>

    <div class="dashboard">
        <div class="score-container">
            <div id="threat-score">0</div>
            <div class="score-label">THREAT LEVEL</div>
        </div>

        <button id="scan-btn">INITIALIZE SCAN</button>

        <div class="analysis-box">
            <div class="tier-header">TIER 1: LOCAL HEURISTICS</div>
            <div id="status-text">Ready to protect...</div>
            <ul id="evidence-list"></ul>
        </div>
    </div>
    <div class="analysis-box">
    <div class="tier-header">TIER 1: LOCAL GUARD</div>
    <div id="status-text">Ready to protect...</div>
    
    <div id="ai-loading-container" style="display:none; margin: 10px 0;">
        <div style="font-size: 10px; color: #888; margin-bottom: 4px;">INITIALIZING EDGE-AI...</div>
        <div style="width: 100%; height: 4px; background: #222; border-radius: 2px;">
            <div id="ai-progress-bar" style="width: 0%; height: 100%; background: #00f0ff; transition: width 0.3s;"></div>
        </div>
    </div>

    <ul id="evidence-list"></ul>
</div>
    <script type="module" src="sidepanel.js"></script>
</body>
</html>
